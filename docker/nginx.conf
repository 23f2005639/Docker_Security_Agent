events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name nginx-target;

        location / {
            return 200 "nginx-target v1.19.0 running\n";
            add_header Content-Type text/plain;
        }

        # VULN: exposes internal nginx status and config info
        location /nginx-status {
            stub_status on;
            allow all;
        }

        # VULN: exposes server tokens and version info
        server_tokens on;
    }
}
