version: "3.9"

# Container Sentinel - Intentionally Vulnerable Sandbox
# WARNING: This environment is deliberately insecure. Run on a dedicated VM only.

services:

  nginx-target:
    image: nginx:1.19.0
    container_name: nginx-target
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      sentinel_net:
        ipv4_address: 172.20.0.2
    restart: unless-stopped

  flask-target:
    build: ./flask-target
    container_name: flask-target
    ports:
      - "5000:5000"
    # VULN: privileged mode - allows full host namespace access
    privileged: true
    # VULN: docker socket mounted - allows spawning containers from within
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # VULN: excessive capabilities
    cap_add:
      - SYS_ADMIN
      - NET_RAW
      - SYS_PTRACE
    networks:
      sentinel_net:
        ipv4_address: 172.20.0.3
    restart: unless-stopped

  redis-target:
    image: redis:5.0
    container_name: redis-target
    ports:
      - "6379:6379"
    # VULN: no authentication, protected mode disabled
    command: redis-server --protected-mode no
    networks:
      sentinel_net:
        ipv4_address: 172.20.0.4
    restart: unless-stopped

  attacker:
    build: ./attacker
    container_name: attacker
    # Attacker also has docker.sock for docker-in-docker attacks
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: tail -f /dev/null
    networks:
      sentinel_net:
        ipv4_address: 172.20.0.5
    restart: unless-stopped

networks:
  sentinel_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
